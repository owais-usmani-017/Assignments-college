<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Roast Arena</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
margin-top:60px;
}

h1{
margin-bottom:20px;
}

input{
padding:10px;
width:250px;
font-size:16px;
margin:10px;
}

select{
padding:10px;
font-size:16px;
margin:10px;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
cursor:pointer;
border:none;
background:#333;
color:white;
border-radius:5px;
}

button:hover{
background:#555;
}

.section{
margin-top:40px;
}

#result{
margin-top:40px;
font-size:20px;
font-weight:bold;
width:650px;
margin-left:auto;
margin-right:auto;
white-space:pre-line;
}

</style>

</head>

<body>

<h1>🔥 AI Roast Arena</h1>

<div class="section">

<input id="userInput" placeholder="Enter a name">

<br>

<label>Roast Style:</label>

<select id="roastStyle">
<option value="friendly">Friendly Roast</option>
<option value="savage">Savage Roast</option>
<option value="nerd">Nerd Roast</option>
<option value="sarcastic">Sarcastic Roast</option>
</select>

<br>

<button onclick="generateRoast()">Roast 🔥</button>
<button onclick="generateCompliment()">Compliment 😊</button>
<button onclick="randomRoast()">🎲 Random Roast</button>

</div>


<div class="section">

<h2>🤖 Roast Battle With AI</h2>

<input id="playerName" placeholder="Your name">

<br>

<input id="playerRoast" placeholder="Roast the AI...">

<br>

<button onclick="battleWithAI()">Roast The AI</button>

</div>


<div id="result"></div>


<script>

const API_KEY = "AIzaSyB0qgf8UF-ASvmYkFxWHscKO8Slp-bNxvk";

let isWaiting = false;

async function callGemini(prompt){

if(isWaiting){
return "Please wait a few seconds...";
}

isWaiting = true;

const response = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
contents:[
{
parts:[
{ text: prompt }
]
}
]
})
});

if(response.status === 429){
isWaiting = false;
return "Too many requests. Wait a few seconds.";
}

const data = await response.json();

isWaiting = false;

if(!data.candidates){
console.log(data);
return "AI couldn't generate a response.";
}

return data.candidates[0].content.parts[0].text;

}


async function generateRoast(){

const input = document.getElementById("userInput").value;

if(!input){
alert("Enter something first!");
return;
}

const style = document.getElementById("roastStyle").value;

document.getElementById("result").innerText = "AI thinking 🤖...";

const prompt = `
You are a witty stand-up comedian.

Roast this person in a ${style} style.

Rules:
- Harmless humor
- One punchline
- Add a funny emoji

Person: ${input}
`;

const result = await callGemini(prompt);

document.getElementById("result").innerText = result;

}


async function generateCompliment(){

const input = document.getElementById("userInput").value;

if(!input){
alert("Enter something first!");
return;
}

document.getElementById("result").innerText = "AI thinking 🤖...";

const prompt = `
You are a motivational speaker.

Give a short uplifting compliment.

Rules:
- Friendly tone
- One sentence
- Add a positive emoji

Person: ${input}
`;

const result = await callGemini(prompt);

document.getElementById("result").innerText = result;

}


async function randomRoast(){

document.getElementById("result").innerText = "AI thinking 🤖...";

const prompt = `
You are a comedian.

Generate a random funny roast.

Rules:
- One punchline
- Harmless humor
- Add a funny emoji
`;

const result = await callGemini(prompt);

document.getElementById("result").innerText = result;

}


async function battleWithAI(){

const name = document.getElementById("playerName").value;
const roast = document.getElementById("playerRoast").value;

if(!name || !roast){
alert("Enter your name and roast!");
return;
}

document.getElementById("result").innerText = "AI preparing comeback 🤖";

const prompt = `
You are a confident sarcastic AI.

A user roasted you.

Reply with a clever comeback roast.

Rules:
- One punchline
- Playful humor
- Not offensive
- Add one emoji

User Name: ${name}

User Roast: ${roast}
`;

const result = await callGemini(prompt);

document.getElementById("result").innerText =
name + ": " + roast + "\n\nAI: " + result;

}

</script>

</body>
</html>
